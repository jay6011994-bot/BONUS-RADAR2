name: 每週更新特價

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Scrape Foldoo
        run: python scrape_official.py

      - name: Commit if changed
        run: |
          git config user.name "bonus-radar-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain data/deals.json)" ]; then
            git add data/deals.json
            git commit -m "update deals"
            git push
            echo "done"
          else
            echo "no change"
          fi
